name: jarvis

on:
  push:
    paths:
      - jarvis/inbox.md
  schedule:
    - cron: "0 23 * * 1-5"
    - cron: "0 23 * * 0,2"
  workflow_dispatch:
    inputs:
      run_stats_report:
        description: "Run the stats report job instead of the overnight Jarvis pipeline"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run-jarvis:
    if: >-
      ${{
        (
          github.event_name == 'push' &&
          !contains(github.event.head_commit.message, '[jarvis-skip]')
        ) ||
        (
          github.event_name == 'schedule' &&
          github.event.schedule == '0 23 * * 1-5'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.run_stats_report != true
        )
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: jarvis-run
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.1

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate Anthropic API smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m orchestrator.utils.anthropic_smoke --model claude-haiku-4-5 --prompt hello

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run Jarvis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
        run: python orchestrator/main.py

      - name: Commit cleared inbox and run logs
        run: |
          git add jarvis/inbox.md
          if [ -f jarvis/usage-history.json ]; then
            git add jarvis/usage-history.json
          fi
          git add jarvis/logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Inbox unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "jarvis: update run state after run [jarvis-skip]"
          git push

  run-stats-report:
    if: >-
      ${{
        (
          github.event_name == 'schedule' &&
          github.event.schedule == '0 23 * * 0,2'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.run_stats_report == true
        )
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: jarvis-stats
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.1

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run stats report
        env:
          POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
        run: python orchestrator/main.py --mode stats_report

      - name: Commit stats output
        run: |
          git add jarvis/ci/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No stats output to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "jarvis: stats report [jarvis-skip]"
          git push
