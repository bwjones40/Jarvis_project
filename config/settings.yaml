models:
  orchestrator: claude-sonnet-4-6
  subagent: claude-haiku-4-5

timeouts:
  orchestrator_seconds: 120
  research_seconds: 90
  gcp_discovery_seconds: 90
  obsidian_writer_seconds: 120
  power_automate_seconds: 30

vault:
  root: jarvis
  knowledge_dir: jarvis/knowledge
  tasks_dir: jarvis/tasks
  digests_dir: jarvis/digests
  lessons_dir: jarvis/agents

power_automate:
  # TODO: operator must set sharepoint_site_url before first run
  sharepoint_site_url: ""
  document_library: ""

research:
  max_context_notes: 3
  max_tokens_per_note: 2000
  cache_hit_threshold: 0.8

logging:
  log_dir: "jarvis/logs"
  stats_dir: "jarvis/ci"

validation:
  pass_threshold: 0.90
  retry_min_threshold: 0.60
  retry_accept_threshold: 0.80
  skip_threshold: 0.60
  timeout_seconds: 30

pii:
  # Modes:
  # - strict: redact names and emails; stop tasks that include either.
  # - standard: redact emails; allow technical metadata names such as dataset/table labels.
  # - off: no PII detection or redaction; use only for explicitly approved local runs.
  mode: standard

gcp:
  # Operator must set this to a readable BigQuery project before daytime discovery.
  project: "dev-2534-puw-procuremen-5af261"
